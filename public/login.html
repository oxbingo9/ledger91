<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구일 - 본인확인</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .title {
      color: #aaa;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: white;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    /* 이름 표시 */
    .name-display {
      display: flex;
      gap: 10px;
      margin-bottom: 50px;
    }
    .name-char {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #16213e;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
    }
    .name-char.hidden {
      border: 2px dashed #e94560;
      background: #0f3460;
      color: transparent;
      position: relative;
    }
    .name-char.hidden.drag-over {
      border-color: #fff;
      background: #1a5090;
      transform: scale(1.1);
      transition: all 0.15s;
    }
    .name-char.hidden.correct {
      border: 2px solid #28a745;
      background: #1a4a2e;
      color: #5dff8f;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.8); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1.0); }
    }

    /* 드래그할 글자들 */
    .letters-area {
      position: relative;
      width: 320px;
      height: 240px;
    }
    .letter-chip {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #0f3460;
      border: 2px solid #e94560;
      color: white;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: box-shadow 0.15s, transform 0.15s;
      touch-action: none;
    }
    .letter-chip:active { cursor: grabbing; transform: scale(1.15); box-shadow: 0 8px 24px rgba(233,69,96,0.5); }
    .letter-chip.dragging { opacity: 0.5; }
    .letter-chip.used { opacity: 0; pointer-events: none; }

    /* 힌트 */
    .hint {
      margin-top: 30px;
      color: #666;
      font-size: 12px;
    }

    /* 성공 오버레이 */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .success-overlay.show { display: flex; }
    .success-text {
      color: #5dff8f;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
      animation: pop 0.4s ease;
    }
    .success-sub {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .go-btn {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 40px;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      animation: pop 0.5s ease 0.2s both;
    }

    /* 실패 메시지 */
    .fail-msg {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: white;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .fail-msg.show { opacity: 1; }

    .loading { color: #aaa; font-size: 16px; }

    /* 새로고침 버튼 */
    .refresh-btn {
      margin-top: 20px;
      background: none;
      border: 1px solid #444;
      color: #888;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .refresh-btn:hover { border-color: #aaa; color: #ccc; }
  </style>
</head>
<body>

<div class="title">Simple Ledger91</div>
<div class="subtitle">본인 확인</div>

<div id="loading" class="loading">회원 정보 불러오는 중...</div>

<div id="game" style="display:none; flex-direction:column; align-items:center;">
  <div class="name-display" id="nameDisplay"></div>
  <div class="letters-area" id="lettersArea"></div>
  <div class="hint">글자를 드래그해서 ○ 안에 놓으세요</div>
  <button class="refresh-btn" onclick="initGame()">↺ 다른 문제</button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-text">✓ 확인되었습니다</div>
  <div class="success-sub" id="successName"></div>
  <button class="go-btn" onclick="goToApp()">회비관리 열기 →</button>
</div>

<div class="fail-msg" id="failMsg">틀렸습니다 😅</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBi82idZAraoDMEMVBhVv66tURB0lSI0UM",
    authDomain: "ledger91-e95ea.firebaseapp.com",
    projectId: "ledger91-e95ea",
    storageBucket: "ledger91-e95ea.firebasestorage.app",
    messagingSenderId: "747494068723",
    appId: "1:747494068723:web:67fe836743fb16f89f8286"
  };

  const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
  const db = getFirestore(app);

  let members = [];
  let currentMember = null;
  let hiddenIndex = -1;
  let correctChar = "";

  // 오답 글자 풀 (자주 쓰이는 한글 글자들)
  const FAKE_CHARS = ["가","나","다","라","마","바","사","아","자","차","카","타","파","하","강","김","이","박","최","정","윤","장","임","한","오","서","신","권","황","안","송","류","전","홍","고","문","양","손","배","조","백","허","유","남","심","노","정","하","곽","성"];

  async function loadMembers() {
    try {
      const snapshot = await getDocs(collection(db, "members"));
      members = snapshot.docs.map(d => d.data()).filter(d => d.NAME && d.NAME.length >= 2);
      document.getElementById("loading").style.display = "none";
      document.getElementById("game").style.display = "flex";
      initGame();
    } catch(e) {
      document.getElementById("loading").textContent = "불러오기 실패: " + e.message;
    }
  }

  window.initGame = function() {
    if (members.length === 0) return;

    // 랜덤 회원 선택
    currentMember = members[Math.floor(Math.random() * members.length)];
    const name = currentMember.NAME;

    // 랜덤 위치 가리기
    hiddenIndex = Math.floor(Math.random() * name.length);
    correctChar = name[hiddenIndex];

    // 이름 표시
    const nameDisplay = document.getElementById("nameDisplay");
    nameDisplay.innerHTML = "";
    for (let i = 0; i < name.length; i++) {
      const div = document.createElement("div");
      div.className = "name-char" + (i === hiddenIndex ? " hidden" : "");
      div.textContent = i === hiddenIndex ? "" : name[i];
      div.dataset.index = i;
      if (i === hiddenIndex) {
        div.addEventListener("dragover", onDragOver);
        div.addEventListener("dragleave", onDragLeave);
        div.addEventListener("drop", onDrop);
      }
      nameDisplay.appendChild(div);
    }

    // 글자 풀 만들기: 정답 1개 + 오답 5~7개
    const fakePool = FAKE_CHARS.filter(c => c !== correctChar);
    const shuffled = fakePool.sort(() => Math.random() - 0.5);
    const fakeCount = Math.floor(Math.random() * 3) + 5; // 5~7개
    const letters = [correctChar, ...shuffled.slice(0, fakeCount)];
    letters.sort(() => Math.random() - 0.5);

    // 글자 칩 배치 (겹치지 않게)
    const area = document.getElementById("lettersArea");
    area.innerHTML = "";
    const placed = [];

    letters.forEach((char, i) => {
      const chip = document.createElement("div");
      chip.className = "letter-chip";
      chip.textContent = char;
      chip.draggable = true;
      chip.dataset.char = char;

      // 겹침 방지 위치 계산
      let x, y, tries = 0;
      do {
        x = Math.random() * 260;
        y = Math.random() * 180;
        tries++;
      } while(tries < 30 && placed.some(p => Math.abs(p.x - x) < 55 && Math.abs(p.y - y) < 55));
      placed.push({x, y});

      chip.style.left = x + "px";
      chip.style.top = y + "px";

      // 드래그 이벤트 (마우스)
      chip.addEventListener("dragstart", onDragStart);
      chip.addEventListener("dragend", onDragEnd);

      // 터치 이벤트 (모바일)
      chip.addEventListener("touchstart", onTouchStart, {passive: false});
      chip.addEventListener("touchmove", onTouchMove, {passive: false});
      chip.addEventListener("touchend", onTouchEnd);

      area.appendChild(chip);
    });
  }

  // ── 드래그 (데스크탑) ──
  let dragChar = "";
  let dragEl = null;

  function onDragStart(e) {
    dragChar = e.target.dataset.char;
    dragEl = e.target;
    e.target.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  }
  function onDragEnd(e) { e.target.classList.remove("dragging"); }
  function onDragOver(e) { e.preventDefault(); e.target.classList.add("drag-over"); }
  function onDragLeave(e) { e.target.classList.remove("drag-over"); }
  function onDrop(e) {
    e.preventDefault();
    e.target.classList.remove("drag-over");
    checkAnswer(dragChar, dragEl);
  }

  // ── 터치 (모바일) ──
  let touchEl = null;
  let touchClone = null;
  let touchChar = "";

  function onTouchStart(e) {
    e.preventDefault();
    touchEl = e.currentTarget;
    touchChar = touchEl.dataset.char;
    const t = e.touches[0];

    // 클론 생성해서 손가락 따라다니게
    touchClone = touchEl.cloneNode(true);
    touchClone.style.position = "fixed";
    touchClone.style.width = "48px";
    touchClone.style.height = "48px";
    touchClone.style.opacity = "0.85";
    touchClone.style.zIndex = "999";
    touchClone.style.pointerEvents = "none";
    touchClone.style.left = (t.clientX - 24) + "px";
    touchClone.style.top = (t.clientY - 24) + "px";
    document.body.appendChild(touchClone);
    touchEl.style.opacity = "0.3";
  }

  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    if (touchClone) {
      touchClone.style.left = (t.clientX - 24) + "px";
      touchClone.style.top = (t.clientY - 24) + "px";
    }
    // 드롭 대상 하이라이트
    const target = document.elementFromPoint(t.clientX, t.clientY);
    document.querySelectorAll(".name-char.hidden").forEach(el => el.classList.remove("drag-over"));
    if (target && target.classList.contains("hidden")) {
      target.classList.add("drag-over");
    }
  }

  function onTouchEnd(e) {
    if (touchClone) { touchClone.remove(); touchClone = null; }
    if (touchEl) touchEl.style.opacity = "1";

    const t = e.changedTouches[0];
    const target = document.elementFromPoint(t.clientX, t.clientY);
    document.querySelectorAll(".name-char.hidden").forEach(el => el.classList.remove("drag-over"));

    if (target && target.classList.contains("hidden")) {
      checkAnswer(touchChar, touchEl);
    }
    touchEl = null;
    touchChar = "";
  }

  // ── 정답 확인 ──
  function checkAnswer(char, chipEl) {
    if (char === correctChar) {
      // 정답!
      const hiddenEl = document.querySelector(".name-char.hidden");
      hiddenEl.textContent = correctChar;
      hiddenEl.classList.add("correct");
      chipEl.classList.add("used");

      setTimeout(() => {
        document.getElementById("successName").textContent = currentMember.NAME + " 님, 환영합니다 🎉";
        document.getElementById("successOverlay").classList.add("show");
      }, 600);
    } else {
      // 오답
      const msg = document.getElementById("failMsg");
      msg.classList.add("show");
      setTimeout(() => msg.classList.remove("show"), 1500);
    }
  }

  window.goToApp = function() {
    window.location.href = "/";
  }

  loadMembers();
</script>
</body>
</html>
